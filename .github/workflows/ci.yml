name: CI

# Events that trigger workflow
on:
  push:
    branches:
      - "*"
  pull_request:

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-24.04
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
      - name: Install Linters
        run: make venv
      - name: Lint
        run: make lint
  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - name: Check Git repository
        uses: actions/checkout@v6
      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.8"
      - name: Build Distribution
        run: |
          make dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: ./dist
  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.8"
      - uses: actions/download-artifact@v8
        with:
          name: wheel
          path: ./dist
      - name: Install Ciel, jq
        run: |
          sudo apt-get install -y jq
          pip3 install ./dist/ciel-*.whl
      - name: Ensure PDK downloads work
        shell: bash
        run: |
          for pdk in $(python3 -m ciel ls-pdks | jq -r 'keys[]' | tr '\n' ' '); do
            version="$(python3 -m ciel ls-remote --pdk $pdk | head -n1)"
            python3 -m ciel fetch --pdk $pdk $version
            python3 -m ciel prune --pdk $pdk --yes
          done
  check_new_version:
    name: Check for new version in pyproject.toml
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref_name == 'main'
    outputs:
      new_tag: ${{ steps.new_tag.outputs.new_tag }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Export Repo URL
        run: echo "REPO_URL=https://github.com/${{ github.repository }}" >> $GITHUB_ENV
      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.8"
      - name: Set default for env.NEW_TAG
        run: echo "NEW_TAG=NO_NEW_TAG" >> $GITHUB_ENV
      - name: Check for new version
        run: |
          make venv
          cd ${GITHUB_WORKSPACE}/ && ./venv/bin/python3 .github/scripts/generate_tag.py
      - id: new_tag
        name: Set new tag as job output
        run: |
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
  publish:
    name: Publish
    runs-on: ubuntu-24.04
    needs: [lint, build, test, check_new_version]
    if: needs.check_new_version.outputs.new_tag != 'NO_NEW_TAG'
    environment: pypi
    permissions:
      # IMPORTANT: this permission is mandatory for Trusted Publishing
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheel
          path: ./dist
      - name: Tag Commit
        uses: tvdias/github-tagger@v0.0.1
        with:
          tag: "${{ needs.check_new_version.outputs.new_tag }}"
          repo-token: "${{ secrets.BOT_TOKEN }}"
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
